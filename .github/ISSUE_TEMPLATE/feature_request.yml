name: 機能要望 / 改善提案
description: 新機能・改善・リファクタリング等の提案
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: 背景 / 動機
      description: なぜこの機能 / 改善が必要か
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: どのように実現するか（実装方針が決まっていない場合は要件レベルでも可）
    validations:
      required: true
  - type: input
    id: related_req
    attributes:
      label: 関連要件 (FR-XX / NFR-XX)
      description: docs/requirements.md の要件番号があれば記載（Phase 2 候補: FR-02 / FR-07 / FR-08 等）
      placeholder: "例: FR-07 キーワード検索"
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案 (任意)
  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件 (任意)
      placeholder: |
        - [ ] ...
        - [ ] ...
